name: Retrain

on:
  schedule:
    - cron: '0 0 * * 0'  # every Sunday midnight UTC
  workflow_dispatch:       # manual trigger button in GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install numpy scipy huggingface_hub

      - name: Download data from HF Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          print('HF Hub connection OK')
          print(f'User: {api.whoami()[\"name\"]}')
          "

      - name: Run drift check
        run: |
          python -c "
          import numpy as np
          from src.monitoring.drift_detector import DriftDetector
          d = DriftDetector()
          rng = np.random.default_rng(42)
          X_ref = rng.normal(0, 1, (200, 50))
          d.fit(X_ref)
          report = d.detect(rng.normal(0, 1, (200, 50)))
          print(f'Drift status: {\"DRIFT\" if report[\"drifted\"] else \"NO DRIFT\"}')
          print(f'Mean PSI: {report[\"mean_psi\"]}')
          "

      - name: Retrain notification
        run: |
          echo "Retrain pipeline completed successfully"
          echo "In production, this would:"
          echo "  1. Pull latest data"
          echo "  2. Run drift detection"
          echo "  3. Retrain if drift detected"
          echo "  4. Register new model in HF Hub"
          echo "  5. Promote if accuracy improves"